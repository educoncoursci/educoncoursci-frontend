<!doctype html>

<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription — EduConcoursCI</title>
    <meta
      name="description"
      content="Crée ton compte gratuit sur EduConcoursCI et commence à préparer ton concours dès aujourd'hui."
    />
    <link rel="icon" href="/assets/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <style>
      .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--gris-fond, #f7f8fa);
      }
      .auth-card {
        width: 100%;
        max-width: 440px;
        padding: 40px 32px;
      }
      .auth-card__logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 24px;
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 1.4rem;
        text-decoration: none;
        color: inherit;
      }
      .auth-card__titre {
        text-align: center;
        margin-bottom: 4px;
      }
      .auth-card__sous-titre {
        text-align: center;
        color: var(--gris-texte, #666);
        margin-bottom: 24px;
        font-size: 0.95rem;
      }
      .auth-card__pied {
        text-align: center;
        margin-top: 20px;
        font-size: 0.9rem;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="card auth-card">
        <a href="/" class="auth-card__logo">
          <span>🎓</span>
          <span>Edu<span style="color: var(--vert, #1a8c4a)">Concours</span>CI</span>
        </a>

        <h1 class="auth-card__titre">Crée ton compte gratuit</h1>
        <p class="auth-card__sous-titre">
          Rejoins des milliers de candidats qui préparent leur concours avec EduConcoursCI.
        </p>

        <div id="erreur-inscription" class="form-erreur hidden"></div>

        <form id="form-inscription" novalidate>
          <div class="form-groupe">
            <label class="form-label" for="nom">Nom complet</label>
            <input
              type="text"
              id="nom"
              name="nom"
              class="form-input"
              placeholder="Ex : Kone Alhassane"
              autocomplete="name"
              required
            />
          </div>

          <div class="form-groupe">
            <label class="form-label" for="email">Adresse e-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="toi@exemple.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-groupe">
            <label class="form-label" for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="8 caractères minimum"
              autocomplete="new-password"
              minlength="8"
              required
            />
            <div class="form-hint">Utilise au moins 8 caractères.</div>
          </div>

          <div class="form-groupe">
            <label class="form-label" for="confirm">Confirmer le mot de passe</label>
            <input
              type="password"
              id="confirm"
              name="confirm"
              class="form-input"
              placeholder="Retape ton mot de passe"
              autocomplete="new-password"
              minlength="8"
              required
            />
          </div>

          <button type="submit" class="btn btn--primaire btn--full">
            Créer mon compte
          </button>
        </form>

        <p class="auth-card__pied">
          Déjà un compte ?
          <a href="/auth/login.html" style="color: var(--vert, #1a8c4a); font-weight: 600;">
            Se connecter
          </a>
        </p>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
    <script>
      // Si déjà connecté, redirige directement vers le dashboard
      if (window.Auth.estConnecte()) {
        window.location.href = "/dashboard/index.html";
      }
      window.Auth.initFormulaireInscription();
    </script>
  </body>
</html>
