<!doctype html>

<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion — EduConcoursCI</title>
    <meta
      name="description"
      content="Connecte-toi à ton compte EduConcoursCI pour accéder à tes cours, QCM et sujets corrigés."
    />
    <link rel="icon" href="/assets/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <style>
      .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--gris-fond, #f7f8fa);
      }
      .auth-card {
        width: 100%;
        max-width: 440px;
        padding: 40px 32px;
      }
      .auth-card__logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 24px;
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 1.4rem;
        text-decoration: none;
        color: inherit;
      }
      .auth-card__titre {
        text-align: center;
        margin-bottom: 4px;
      }
      .auth-card__sous-titre {
        text-align: center;
        color: var(--gris-texte, #666);
        margin-bottom: 24px;
        font-size: 0.95rem;
      }
      .auth-card__pied {
        text-align: center;
        margin-top: 20px;
        font-size: 0.9rem;
      }
      .auth-card__oubli {
        text-align: right;
        margin: -8px 0 20px;
      }
      .auth-card__oubli a {
        font-size: 0.85rem;
        color: var(--gris-texte, #666);
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="card auth-card">
        <a href="/" class="auth-card__logo">
          <span><span data-icone="logo" data-taille="18" style="display:inline-flex;vertical-align:-3px;"></span></span>
          <span>Edu<span style="color: var(--vert, #1a8c4a)">Concours</span>CI</span>
        </a>

        <h1 class="auth-card__titre">Content de te revoir</h1>
        <p class="auth-card__sous-titre">
          Connecte-toi pour continuer ta préparation.
        </p>

        <div id="erreur-connexion" class="form-erreur hidden"></div>

        <form id="form-connexion" novalidate>
          <div class="form-groupe">
            <label class="form-label" for="email">Adresse e-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="toi@exemple.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-groupe">
            <label class="form-label" for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Ton mot de passe"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="auth-card__oubli">
            <a href="/auth/forgot-password.html">Mot de passe oublié ?</a>
          </div>

          <button type="submit" class="btn btn--primaire btn--full">
            Se connecter
          </button>
        </form>

        <p class="auth-card__pied">
          Pas encore de compte ?
          <a href="/auth/register.html" style="color: var(--vert, #1a8c4a); font-weight: 600;">
            Inscription gratuite
          </a>
        </p>
      </div>
    </div>

    <script src="/js/icons.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
    <script>
      // Si déjà connecté, redirige directement vers le dashboard
      if (window.Auth.estConnecte()) {
        window.location.href = "/dashboard/index.html";
      }
      window.Auth.initFormulaireConnexion();
    </script>
  </body>
</html>
