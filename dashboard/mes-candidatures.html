<!doctype html>

<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mes Candidatures — EduConcoursCI</title>
    <link rel="icon" href="/assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/recherche.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <style>
      .candidature-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px;
        border-radius: 12px;
        background: var(--blanc);
        margin-bottom: 10px;
        box-shadow: var(--ombre-sm);
        flex-wrap: wrap;
        gap: 10px;
      }
      .candidature-statut {
        font-size: 0.75rem;
        font-weight: 700;
        padding: 4px 12px;
        border-radius: 20px;
        text-transform: uppercase;
      }
      .statut-envoyée { background: rgba(10,110,189,0.1); color: var(--bleu); }
      .statut-vue { background: rgba(245,158,11,0.1); color: #f59e0b; }
      .statut-retenue { background: rgba(26,107,60,0.1); color: var(--vert); }
      .statut-refusée { background: rgba(220,38,38,0.1); color: #dc2626; }
    </style>
  </head>
  <body style="background: var(--gris-clair)">
    <nav class="navbar" id="navbar">
      <div class="navbar__inner">
        <a href="/" class="navbar__logo"
          ><div class="navbar__logo-icon"><img src="/assets/logo-icon.png" alt="EduConcoursCI" /></div>
          <span class="navbar__logo-texte">Edu<span>Concours</span>CI</span></a
        >
        <div class="navbar__actions" id="navbar-actions"></div>
      </div>
    </nav>

    <div style="padding-top: var(--navbar-h)">
      <div class="dashboard">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar__profil">
            <div class="sidebar__avatar" id="sidebar-avatar">?</div>
            <div class="sidebar__nom" id="sidebar-nom">—</div>
            <div class="sidebar__email" id="sidebar-email"></div>
            <div id="sidebar-badge"></div>
          </div>
          <nav class="sidebar__nav">
            <div class="sidebar__titre">Menu</div>
            <a href="/dashboard/index.html" class="sidebar__lien"
              ><span class="sidebar__icone"><span data-icone="graphique" data-taille="18" style="display:inline-flex;vertical-align:-3px;"></span></span> Tableau de bord</a
            >
            <a href="/dashboard/mes-scores.html" class="sidebar__lien"
              ><span class="sidebar__icone"><span data-icone="trophee" data-taille="18" style="display:inline-flex;vertical-align:-3px;"></span></span> Mes scores</a
            >
            <a href="/dashboard/mes-concours.html" class="sidebar__lien"
              ><span class="sidebar__icone"><span data-icone="institution" data-taille="18" style="display:inline-flex;vertical-align:-3px;"></span></span> Mes concours</a
            >
            <a href="/dashboard/mes-candidatures.html" class="sidebar__lien actif"
              ><span class="sidebar__icone"><span data-icone="portefeuille" data-taille="18" style="display:inline-flex;vertical-align:-3px;"></span></span> Mes candidatures</a
            >
            <a href="/dashboard/mes-downloads.html" class="sidebar__lien"
              ><span class="sidebar__icone"><span data-icone="telechargement" data-taille="18" style="display:inline-flex;vertical-align:-3px;"></span></span> Téléchargements</a
            >
            <a href="/dashboard/paiements.html" class="sidebar__lien"
              ><span class="sidebar__icone"><span data-icone="paiement" data-taille="18" style="display:inline-flex;vertical-align:-3px;"></span></span> Paiements</a
            >
            <a href="/dashboard/profil.html" class="sidebar__lien"
              ><span class="sidebar__icone"><span data-icone="utilisateurs" data-taille="18" style="display:inline-flex;vertical-align:-3px;"></span></span> Mon profil</a
            >
          </nav>
          <div class="sidebar__deconnexion">
            <button
              onclick="window.Auth?.deconnecter?.()"
              class="btn btn--outline-vert btn--sm btn--full"
            >
              Déconnexion
            </button>
          </div>
        </aside>

        <main class="dashboard__contenu">
          <div class="dashboard__header">
            <div>
              <h1><span data-icone="portefeuille" data-taille="18" style="display:inline-flex;vertical-align:-3px;"></span> Mes candidatures</h1>
              <p style="color: var(--gris-texte); margin: 4px 0 0; font-size: 0.9rem;">
                Suivi de tes candidatures aux offres d'emploi
              </p>
            </div>
            <a href="/emploi.html" class="btn btn--primaire btn--sm">
              <span data-icone="loupe" data-taille="18" style="display:inline-flex;vertical-align:-3px;"></span> Voir les offres
            </a>
          </div>

          <div id="candidatures-conteneur">
            <div style="text-align:center; color: var(--gris-texte); padding: 40px;">Chargement…</div>
          </div>
        </main>
      </div>
    </div>

    <script src="/js/icons.js"></script>
    <script src="/js/recherche.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        if (!window.Auth?.estConnecte()) {
          window.location.href = "/auth/login.html";
          return;
        }
        const session = window.Auth.getSession();
        document.getElementById("sidebar-avatar").textContent = session.nom?.[0]?.toUpperCase() || "?";
        document.getElementById("sidebar-nom").textContent = session.nom || "";
        document.getElementById("sidebar-email").textContent = session.email || "";
        document.getElementById("sidebar-badge").innerHTML = session.premium
          ? '<div class="sidebar__badge-premium">⭐ Premium</div>'
          : '<div class="sidebar__badge-gratuit">🆓 Gratuit</div>';

        chargerCandidatures();
      });

      const LABELS_STATUT = {
        "envoyée": "Envoyée", "vue": "Vue par l'employeur",
        "retenue": "Candidature retenue", "refusée": "Non retenue",
      };

      async function chargerCandidatures() {
        const conteneur = document.getElementById("candidatures-conteneur");
        try {
          const data = await window.API.Emploi.mesCandidatures();

          if (data.total === 0) {
            conteneur.innerHTML = `
              <div class="empty-state">
                <div class="empty-state__icone">💼</div>
                <div class="empty-state__titre">Tu n'as encore postulé à aucune offre</div>
                <div class="empty-state__texte">Explore les offres disponibles et lance-toi.</div>
                <a href="/emploi.html" class="btn btn--primaire btn--sm" style="margin-top:12px;">Voir les offres →</a>
              </div>`;
            return;
          }

          conteneur.innerHTML = data.candidatures.map(c => `
            <div class="candidature-item">
              <div>
                <div style="font-weight:700;">${c.offre_titre}</div>
                <div style="font-size:0.85rem; color:var(--gris-texte);">${c.entreprise} · ${c.type_contrat}</div>
              </div>
              <div class="candidature-statut statut-${c.statut}">${LABELS_STATUT[c.statut] || c.statut}</div>
            </div>
          `).join("");
        } catch (err) {
          conteneur.innerHTML = `<div style="color:#dc2626; text-align:center; padding:40px;">Erreur de chargement.</div>`;
        }
      }
    </script>
  </body>
</html>
